<svg width="320" height="300" viewBox="0 0 320 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- outer hexagon segment gradients (bonito-dark colour scheme) -->
    <linearGradient id="bz_s0" gradientUnits="userSpaceOnUse" x1="160" y1="32" x2="262.2" y2="91"><stop offset="0%" stop-color="#e27f46"/><stop offset="100%" stop-color="#dd3366"/></linearGradient>
    <linearGradient id="bz_s1" gradientUnits="userSpaceOnUse" x1="262.2" y1="91" x2="262.2" y2="209"><stop offset="0%" stop-color="#dd3366"/><stop offset="100%" stop-color="#875b91"/></linearGradient>
    <linearGradient id="bz_s2" gradientUnits="userSpaceOnUse" x1="262.2" y1="209" x2="160" y2="268"><stop offset="0%" stop-color="#875b91"/><stop offset="100%" stop-color="#3182bb"/></linearGradient>
    <linearGradient id="bz_s3" gradientUnits="userSpaceOnUse" x1="160" y1="268" x2="57.8" y2="209"><stop offset="0%" stop-color="#3182bb"/><stop offset="100%" stop-color="#8ca670"/></linearGradient>
    <linearGradient id="bz_s4" gradientUnits="userSpaceOnUse" x1="57.8" y1="209" x2="57.8" y2="91"><stop offset="0%" stop-color="#8ca670"/><stop offset="100%" stop-color="#e8cb26"/></linearGradient>
    <linearGradient id="bz_s5" gradientUnits="userSpaceOnUse" x1="57.8" y1="91" x2="160" y2="32"><stop offset="0%" stop-color="#e8cb26"/><stop offset="100%" stop-color="#e27f46"/></linearGradient>

    <!-- dashi bowl + chopstick gradients (verbatim from dashi.svg) -->
    <linearGradient id="d3" gradientUnits="userSpaceOnUse" x1="195.8584" y1="106.5332" x2="404.1431" y2="467.2928"><stop offset="0.0099" stop-color="#FCEA10"/><stop offset="1" stop-color="#FFDE00"/></linearGradient>
    <linearGradient id="d4" gradientUnits="userSpaceOnUse" x1="197.8574" y1="108.1982" x2="406.1426" y2="468.9587"><stop offset="0.0099" stop-color="#E69C03"/><stop offset="1" stop-color="#FFDE00"/></linearGradient>
    <linearGradient id="d8" gradientUnits="userSpaceOnUse" x1="305.6357" y1="282.7998" x2="281.9926" y2="291.8755" gradientTransform="matrix(0.9898 -0.1423 0.1423 0.9898 -38.0328 47.0515)"><stop offset="0.0296" stop-color="#000000"/><stop offset="1" stop-color="#3D2A14"/></linearGradient>
    <linearGradient id="d9" gradientUnits="userSpaceOnUse" x1="334.3125" y1="253.1284" x2="311.6358" y2="261.8332" gradientTransform="matrix(0.9843 -0.1766 0.1766 0.9843 -51.8185 82.5834)"><stop offset="0.0296" stop-color="#000000"/><stop offset="1" stop-color="#3D2A14"/></linearGradient>

    <clipPath id="bz_clip"><circle cx="160" cy="150" r="64"/></clipPath>
    <linearGradient id="bz_ring" gradientUnits="userSpaceOnUse" x1="160" y1="86" x2="160" y2="214"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="100%" stop-color="#ffffff" stop-opacity="0.22"/></linearGradient>
  </defs>

  <!-- outer hexagon -->
  <g stroke-width="15" stroke-linecap="round" fill="none">
    <line x1="160" y1="32" x2="262.2" y2="91" stroke="url(#bz_s0)"/>
    <line x1="262.2" y1="91" x2="262.2" y2="209" stroke="url(#bz_s1)"/>
    <line x1="262.2" y1="209" x2="160" y2="268" stroke="url(#bz_s2)"/>
    <line x1="160" y1="268" x2="57.8" y2="209" stroke="url(#bz_s3)"/>
    <line x1="57.8" y1="209" x2="57.8" y2="91" stroke="url(#bz_s4)"/>
    <line x1="57.8" y1="91" x2="160" y2="32" stroke="url(#bz_s5)"/>
  </g>

  <!-- dashi bowl + chopsticks, centered (302,288.578)->(160,150) and scaled to the hexagon -->
  <g clip-path="url(#bz_clip)">
    <g transform="translate(160 150) scale(0.306) translate(-302 -288.578)">
      <ellipse fill="url(#d3)" cx="300" cy="286.912" rx="209" ry="208"/>
      <ellipse fill="url(#d4)" cx="302" cy="288.578" rx="209" ry="208"/>
      <polygon fill="url(#d8)" points="146.062,39.245 423.413,547.941 446.803,537.885 152.765,34.588"/>
      <polygon fill="url(#d9)" points="153.984,34.055 451.854,534.365 472.489,521.548 161.496,31.775"/>
    </g>
  </g>

  <!-- bowl rim -->
  <circle cx="160" cy="150" r="64" fill="none" stroke="url(#bz_ring)" stroke-width="3.5"/>
</svg>
