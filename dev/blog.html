02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"></path></svg></span></a><button data-toggle-theme="true" class="icon-btn" data-jscall-id="22" title="Toggle theme" type="button"><span style="display:inline-flex" data-jscall-id="23"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg></span></button></div></div></div><div class="VPContent is-blog no-sidebar" data-jscall-id="24"><div class="blog-container" data-jscall-id="25"><link rel="alternate" data-jscall-id="26" href="feed.xml" title="Bonito Blog" type="application/rss+xml" /><h1 class="blog-index-title" data-jscall-id="27">Blog</h1><div class="blog-grid" data-jscall-id="28"><a class="blog-card" href="v5-release.html" data-jscall-id="29"><div class="blog-card-body" data-jscall-id="30"><div class="blog-card-date" data-jscall-id="31">June 18, 2026</div><h3 class="blog-card-title" data-jscall-id="32">Bonito 5.0</h3><p class="blog-card-desc" data-jscall-id="33">The biggest release since JSServe: much faster Julia/browser communication, a Bonito-powered documentation system, the BonitoWidgets package, remote apps and dark-mode-aware widgets.</p></div></a></div></div></div><div class="VPSearch-backdrop" data-jscall-id="34"><div class="VPSearch" data-jscall-id="35"><div class="search-bar" data-jscall-id="36"><span style="display:inline-flex" data-jscall-id="37"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></span><input spellcheck="false" data-jscall-id="38" placeholder="Search docs" type="text" autocomplete="off" /></div><div class="results" data-jscall-id="39"></div></div></div><script data-jscall-id="231">window.__DOCS_SEARCH__ = [{"title":"Home","text":"Bonito.jl is a pretty simple package allowing you to render HTML and serve it from within Julia and build up a communication bridge with the Browser. This allows to combine any of your Julia applications with libraries like WGLMakie and create interactive Dashboards like this:\n\n(Image: dashboard)\n\nBonito is tightly integrated with WGLMakie, which makes them a great pair for high performance, interactive visualizations. If performance is not a high priority, many other plotting/visualization libraries which overload the Julia display system should work with Bonito.jl as well.\n\nBonito.jl itself tries to stay out of major choices like the HTML/CSS/Javascript framework to use for creating UIs and Dashboards. Instead, it allows to create modular components and makes it easy to use any CSS/Javascript library.\n\nIt uses plain HTML widgets for UI elements where it can, and there are a few styleable components like Card, Grid, Row, Col to make it easy to create some more complex dashboards out of the box.\n\nIf you look at the source of those components, one will see that they're very simple and easy to create, which should help to create a rich ecosystem of extensions around Bonito.jl. Read more about it in Components.\n\nQuickstart\n\nusing Bonito\nBonito.Page()\n\nAt the core of Bonito you have DOM to create any HTML tag, js\"...\" to run Javascript, and App to wrap your creation and serve it anywhere:\n\nusing Bonito\napp = App() do\n    return DOM.div(DOM.h1(\"hello world\"), js\"\"\"console.log('hel","url":"index.html"},{"title":"Quickstart","text":"Home › Quickstart","url":"index.html#Quickstart"},{"title":"Easy integration with existing JS + CSS libraries","text":"Home › Easy integration with existing JS + CSS libraries","url":"index.html#Easy-integration-with-existing-JS-CSS-libraries"},{"title":"Deploying","text":"Home › Deploying","url":"index.html#Deploying"},{"title":"App","text":"App\n\nThe App type is the main entry point for creating Bonito applications. It wraps your content and handles the connection between Julia and the browser.\n\nBasic Usage\n\nusing Bonito\n\n# Simple app with static content\napp = App(DOM.div(\"Hello World\"))\n\n# App with session access\napp = App() do session::Session\n    button = Button(\"Click me\")\n    on(button.value) do _\n        println(\"Button clicked!\")\n    end\n    return button\nend\n\n# App with request access (useful for routing)\napp = App() do session::Session, request::HTTP.Request\n    path = request.target\n    return DOM.div(\"You requested: $path\")\nend\n\nApp Options\n\nThe App constructor accepts the following keyword arguments:\n\nApp(handler;\n    title=\"Bonito App\",     # Browser tab title\n    indicator=nothing,       # Connection status indicator (nothing by default)\n    loading_page=nothing     # Loading page shown while handler runs (nothing by default)\n)\n\nLoading Page\n\nWhen an app takes time to initialize (e.g. loading data, compiling code), users see a blank page. The loading_page option shows a loading spinner while the handler runs, then replaces it with the real content once ready.\n\nBasic Usage\n\napp = App(; loading_page=LoadingPage()) do session\n    data = expensive_setup()  # Takes a few seconds\n    return DOM.div(data)\nend\n\nWhen loading_page is set, the app DOM is wrapped in an Observable. The loading page is displayed immediately, and the handler runs asynchronously. Once the handler returns, the loading page is replac","url":"app.html"},{"title":"Basic Usage","text":"App › Basic Usage","url":"app.html#Basic-Usage"},{"title":"App Options","text":"App › App Options","url":"app.html#App-Options"},{"title":"Loading Page","text":"App › Loading Page","url":"app.html#Loading-Page"},{"title":"Basic Usage","text":"App › Basic Usage","url":"app.html#Basic-Usage-2"},{"title":"Customization","text":"App › Customization","url":"app.html#Customization"},{"title":"How It Works","text":"App › How It Works","url":"app.html#How-It-Works"},{"title":"Connection Indicator","text":"App › Connection Indicator","url":"app.html#Connection-Indicator"},{"title":"Enabling the Indicator","text":"App › Enabling the Indicator","url":"app.html#Enabling-the-Indicator"},{"title":"Customizing Colors and Size","text":"App › Customizing Colors and Size","url":"app.html#Customizing-Colors-and-Size"},{"title":"Customizing Position","text":"App › Customizing Position","url":"app.html#Customizing-Position"},{"title":"ConnectionIndicator Arguments","text":"App › ConnectionIndicator Arguments","url":"app.html#ConnectionIndicator-Arguments"},{"title":"Creating a Custom Indicator","text":"App › Creating a Custom Indicator","url":"app.html#Creating-a-Custom-Indicator"},{"title":"JavaScript API for Custom Indicators","text":"App › JavaScript API for Custom Indicators","url":"app.html#JavaScript-API-for-Custom-Indicators"},{"title":"Styling","text":"Styling\n\nBasics\n\nusing Bonito\nPage()\n\nThe main type to style the DOM via css is Style:\n\nStyles\n\nUsing CSS and pseudo classes\n\nThe CSS object allows to specify a selector, which will be used to apply the styling to a specific DOM node. Since the main usage is to apply the Style object to a DOM node, the selector is usually empty and we use it mainly for pseudo classes like :hover:\n\nApp() do session\n    return DOM.div(\n        \"This turns red on hover\",\n        style=Styles(\n            CSS(\":hover\", \"color\" => \"red\", \"text-size\" => \"2rem\")\n        )\n    )\nend\n\nA more involved example is the style we use for Button:\n\nApp() do\n    style = Styles(\n        CSS(\n            \"font-weight\" => 600,\n            \"border-width\" => \"1px\",\n            \"border-color\" => \"#9CA3AF\",\n            \"border-radius\" => \"0.25rem\",\n            \"padding-left\" => \"0.75rem\",\n            \"padding-right\" => \"0.75rem\",\n            \"padding-top\" => \"0.25rem\",\n            \"padding-bottom\" => \"0.25rem\",\n            \"margin\" => \"0.25rem\",\n            \"cursor\" => \"pointer\",\n            \"min-width\" => \"8rem\",\n            \"font-size\" => \"1rem\",\n            \"background-color\" => \"white\",\n            \"box-shadow\" => \"rgba(0, 0, 0, 0) 0px 0px 0px 0px, rgba(0, 0, 0, 0) 0px 0px 0px 0px, rgba(0, 0, 0, 0.1) 0px 1px 3px 0px, rgba(0, 0, 0, 0.1) 0px 1px 2px -1px\";\n        ),\n        CSS(\n            \":hover\",\n            \"background-color\" => \"#F9FAFB\",\n            \"box-shadow\" => \"rgba(0, 0, 0, 0) 0px 0px 0px 0px\",\n      ","url":"styling.html"},{"title":"Basics","text":"Styling › Basics","url":"styling.html#Basics"},{"title":"Using CSS and pseudo classes","text":"Styling › Using CSS and pseudo classes","url":"styling.html#Using-CSS-and-pseudo-classes"},{"title":"Using Styles as global Stylesheet","text":"Styling › Using Styles as global Stylesheet","url":"styling.html#Using-Styles-as-global-Stylesheet"},{"title":"Components","text":"Components\n\nComponents in Bonito are meant to be re-usable, easily shareable types and functions to create complex Bonito Apps. We invite everyone to share their Components by turning them into a Julia library.\n\nThere are two ways of defining components in Bonito:\n\nWrite a function which returns DOM objects\nOverload jsrender for a type\n\nThe first is a very lightweight form of defining reusable components, which should be preferred if possible.\n\nBut, for e.g. widgets the second form is unavoidable, since you will want to return a type that the user can register interactions with. Also, the second form is great for integrating existing types into Bonito like plot objects. How to do the latter for Plotly is described in Plotting.\n\nLet's start with the simple function based components that reuses existing Bonito components:\n\nusing Bonito\nBonito.Page()\n\nusing Dates\nfunction CurrentMonth(date=now(); style=Styles(), div_attributes...)\n    current_day = Dates.day(date)\n    month = Dates.monthname(date)\n    ndays = Dates.daysinmonth(date)\n    current_day_style = Styles(style, \"background-color\" => \"gray\", \"color\" => \"white\")\n    days = map(1:ndays) do day\n        if day == current_day\n            return Card(Centered(day); style=current_day_style)\n        else\n            return Card(Centered(day); style=style)\n        end\n    end\n    grid = Grid(days...; columns=\"repeat(7, 1fr)\")\n    return DOM.div(DOM.h2(month), grid; style=Styles(\"width\" => \"400px\", \"margin\" => \"5px\"))\nend\n\n\nApp(()","url":"components.html"},{"title":"Layouting","text":"Layouting\n\nThe main layouting primitive Bonito offers is Grid, Column and Row. They are all based on css display: grid and Bonito offers a small convenience wrapper around it.\n\nWe recommend reading through the great introduction to Styles grids by Josh Comeau: interactive guide to grid, for a better understanding of how grids work. It's recommended to read this before following this tutorial, since the examples are styled much nicer and explain everything in much greater detail.\n\nTo easier apply the tutorial to Bonito, we ported all the examples of the tutorial, while only describing them with the bare minimum. To get the full picture, please refer to the linked, original tutorial!\n\nLet's start with the docstring for Grid:\n\nGrid\n\nIt pretty much just sets the css attributes to some defaults, but everything can be overwritten or extended by passing your own style=Styles(...) object. All Styles objects inside one App will be merged into a single stylesheet, so using many grids with the same keyword arguments will only generate one entry into the global stylesheet. You can read more about this in the styling section.\n\nThere's also Row and Col which uses Grid under the hood:\n\nRow\nCol\n\nusing Bonito\nPage()\n\nImplicit Grids\n\nIf we don't specify any attributes for the Grid, the default will be one dynamic column, where every item gets their own row:\n\n\n\nDemoCard(content=DOM.div(); style=Styles(), attributes...) = Card(content; backgroundcolor=:silver, border_radius=\"2px\", style=Styles(s","url":"layouting.html"},{"title":"Implicit Grids","text":"Layouting › Implicit Grids","url":"layouting.html#Implicit-Grids"},{"title":"Assigning children","text":"Layouting › Assigning children","url":"layouting.html#Assigning-children"},{"title":"Grid areas","text":"Layouting › Grid areas","url":"layouting.html#Grid-areas"},{"title":"Alignment","text":"Layouting › Alignment","url":"layouting.html#Alignment"},{"title":"Widgets","text":"Widgets\n\nusing Bonito\nPage()\n\nAll Available widgets\n\nButton\n\ninclude_string(@__MODULE__, Bonito.BUTTON_EXAMPLE) # hide\n\nTextField\n\ninclude_string(@__MODULE__, Bonito.TEXTFIELD_EXAMPLE) # hide\n\nNumberInput\n\ninclude_string(@__MODULE__, Bonito.NUMBERINPUT_EXAMPLE) # hide\n\nDropdown\n\ninclude_string(@__MODULE__, Bonito.DROPDOWN_EXAMPLE) # hide\n\nCard\n\ninclude_string(@__MODULE__, Bonito.CARD_EXAMPLE) # hide\n\nStylableSlider\n\ninclude_string(@__MODULE__, Bonito.STYLABLE_SLIDER_EXAMPLE) # hide\n\nBonito.Table\n\nThe Table widget provides an interactive way to display tabular data that conforms to the Tables.jl interface. It supports custom styling, interactive sorting, and flexible cell rendering.\n\nBasic Usage\n\n\n# Create sample data using named tuples\ndata = [\n    (name=\"Alice\", age=25, score=95.5),\n    (name=\"Bob\", age=30, score=87.2),\n    (name=\"Charlie\", age=22, score=92.8)\n]\n\n# Basic table\nbasic_table = Bonito.Table(data)\nApp(basic_table)\n\nCustom Cell Styling\n\nYou can provide custom class and style callbacks to control the appearance of individual cells:\n\n# Color coding function based on values\nfunction score_class_callback(table, row, col, val)\n    # Color the score column based on value\n    if col == 3 && isa(val, Number)  # Score column\n        if val >= 90\n            return \"cell-good\"\n        elseif val >= 80\n            return \"cell-neutral\"\n        else\n            return \"cell-bad\"\n        end\n    end\n    return \"cell-default\"\nend\n\n# Style callback for additional formatting\nfunc","url":"widgets.html"},{"title":"All Available widgets","text":"Widgets › All Available widgets","url":"widgets.html#All-Available-widgets"},{"title":"Basic Usage","text":"Widgets › Basic Usage","url":"widgets.html#Basic-Usage"},{"title":"Custom Cell Styling","text":"Widgets › Custom Cell Styling","url":"widgets.html#Custom-Cell-Styling"},{"title":"Sorting Options","text":"Widgets › Sorting Options","url":"widgets.html#Sorting-Options"},{"title":"Working with DataFrames","text":"Widgets › Working with DataFrames","url":"widgets.html#Working-with-DataFrames"},{"title":"Advanced Example: Financial Data","text":"Widgets › Advanced Example: Financial Data","url":"widgets.html#Advanced-Example:-Financial-Data"},{"title":"Widgets in Layouts","text":"Widgets › Widgets in Layouts","url":"widgets.html#Widgets-in-Layouts"},{"title":"Editor","text":"Widgets › Editor","url":"widgets.html#Editor"},{"title":"Tailwinddashboard","text":"Widgets › Tailwinddashboard","url":"widgets.html#Tailwinddashboard"},{"title":"Interactions","text":"Interactions\n\nAnimations in Bonito are done via Observables.jl, much like it's the case for Makie.jl, so the same docs apply:\n\nobservables\nanimation\n\nBut lets quickly get started with a Bonito specific example:\n\nusing Bonito\nPage()\n\nApp() do session\n    s = Slider(1:3)\n    value = map(s.value) do x\n        return x ^ 2\n    end\n    # record_states captures widget interactions for static HTML export\n    # This allows the slider to remain interactive even without a Julia backend!\n    return Bonito.record_states(session, DOM.div(s, value))\nend\n\nThe s.value is an Observable which can be mapp'ed to take on new values, and one can insert observables as an input to DOM.tag or as any attribute. The value of the observable will be rendered via jssrender(session, observable[]), and then updated whenever the value changes. So anything that supports being inserted into the DOM can be inside an observable, and the fallback is to use the display system (so plots etc. work as well). This way, one can also return DOM elements as the result of an observable:\n\nApp() do session\n    s = Slider(1:3)\n    # use map!(result_observable, ...)\n    # To use any as the result type, otherwise you can't return\n    # different types from the map callback\n    value = map!(Observable{Any}(), s.value) do x\n        if x == 1\n            return DOM.h1(\"hello from slider: $(x)\")\n        elseif x == 2\n            return DOM.img(src=\"https://docs.makie.org/stable/logo.svg\", width=\"200px\")\n        else\n            re","url":"interactions.html"},{"title":"Understanding record_states Limitations","text":"Interactions › Understanding record_states Limitations","url":"interactions.html#Understanding-record_states-Limitations"},{"title":"Creating Interactive Examples","text":"Interactions › Creating Interactive Examples","url":"interactions.html#Creating-Interactive-Examples"},{"title":"Plotting","text":"Plotting\n\nAll plotting frameworks overloading the Julia display system should work out of the box and all Javascript plotting libraries should be easy to integrate! The following example shows how to integrate popular libraries like Makie, Plotly and Gadfly.\n\nusing Bonito\nusing WGLMakie\nimport WGLMakie as W\nimport Gadfly as G\nimport PlotlyLight as PL\n\nPage() # required for multi cell output inside documenter\n\nfunction makie_plot()\n    N = 10\n    function xy_data(x, y)\n        r = sqrt(x^2 + y^2)\n        r == 0.0 ? 1.0f0 : (sin(r) / r)\n    end\n    l = range(-10, stop=10, length=N)\n    z = Float32[xy_data(x, y) for x in l, y in l]\n    W.surface(\n        -1 .. 1, -1 .. 1, z,\n        colormap=:Spectral,\n        figure=(; size=(300, 300))\n    )\nend\n\n# As far as I can tell, PlotlyLight doesn't handle require inside documenter correctly\n# So we just use Bonito to do it correctly via `Asset`:\nconst Plotly = Bonito.Asset(PL.plotly.url)\n\nfunction Bonito.jsrender(session::Session, plot::PL.Plot)\n    # Pretty much copied from the PlotlyLight source to create the JS + div for creating the plot:\n    div = DOM.div(style=\"width: 300px;height: 300px;\")\n    src = js\"\"\"\n        Plotly.newPlot($(div), $(plot.data), $(plot.layout), $(plot.config))\n    \"\"\"\n    return Bonito.jsrender(session, DOM.div(Plotly, div, src))\nend\n\nApp() do\n    p = PL.plot(x = 1:20, y = cumsum(randn(20)), type=\"scatter\", mode=\"lines+markers\")\n    G.set_default_plot_size(300G.px, 300G.px)\n    gp = G.plot([sin, cos], 0, 2pi)","url":"plotting.html"},{"title":"Javascript","text":"Javascript\n\nWrapping Javascript Libraries\n\nusing Bonito\nBonito.Page()\n\nleafletjs = Bonito.ES6Module(\"https://esm.sh/v133/leaflet@1.9.4/es2022/leaflet.mjs\")\nleafletcss = Bonito.Asset(\"https://unpkg.com/leaflet@1.9.4/dist/leaflet.css\")\nstruct LeafletMap\n    position::NTuple{2,Float64}\n    zoom::Int\nend\n\nfunction Bonito.jsrender(session::Session, map::LeafletMap)\n\n    map_div = DOM.div(id=\"map\"; style=\"height: 500px;\")\n\n    return Bonito.jsrender(session, DOM.div(\n        leafletcss,\n        leafletjs,\n        map_div,\n        js\"\"\"\n            $(leafletjs).then(L=> {\n                const map = L.map('map').setView($(map.position), $(map.zoom));\n                L.tileLayer(\n                    'https://tile.openstreetmap.org/{z}/{x}/{y}.png', {\n                    maxZoom: 19,\n                    attribution: '&copy; <a href=\"http://www.openstreetmap.org/copyright\">OpenStreetMap</a>'\n                }).addTo(map);\n            })\n\n        \"\"\"\n    ))\nend\n\n\nApp() do\n    return LeafletMap((51.505, -0.09), 13)\nend\n\n","url":"javascript-libraries.html"},{"title":"Wrapping Javascript Libraries","text":"Javascript › Wrapping Javascript Libraries","url":"javascript-libraries.html#Wrapping-Javascript-Libraries"},{"title":"Assets","text":"Assets\n\nAssets in Bonito represent external resources like JavaScript libraries, CSS files, images, and other files. They handle loading, bundling, and serving these resources efficiently across different deployment ways (Server/Plotpane/Notebooks/Static Site/Documenter).\n\nBasic Usage\n\nAssets can reference local files or remote URLs and are automatically served with the appropriate URLs:\n\nusing Bonito\nPage()\n\nusing Bonito\n\n# Load a local image\ndashi_logo = Asset(joinpath(@__DIR__, \"dashi.png\"))\n\n# Create an app that displays the image\napp = App() do\n    # Use CSS class selector to style child images of this specific container\n    img_styles = Styles(CSS(\".asset-container > img\", \"width\" => \"400px\"))\n    DOM.div(\n        img_styles,\n        DOM.div(\n            DOM.h2(\"Asset Example\"),\n            DOM.p(\"Assets render automatically as the appropriate DOM element:\"),\n            dashi_logo,  # Automatically becomes DOM.img(src=url_to_asset)\n            DOM.p(\"Or use assets as src attributes for more control:\"),\n            DOM.img(src=dashi_logo; width=\"400px\");  # Asset URL is inserted as src\n            class=\"asset-container\"\n        )\n    )\nend\n\nJavaScript Assets\n\nJavaScript assets come in two flavors: ES6 modules and traditional scripts.\n\nES6 Modules\n\nES6Module\n\nYou can also use the convenient CDN helper (uses esm.sh):\n\nTHREE = CDNSource(\"three\"; version=\"0.137.5\")\n\nTraditional Scripts (Non-module)\n\nFor traditional JavaScript libraries that expose global variables (like jQ","url":"assets.html"},{"title":"Basic Usage","text":"Assets › Basic Usage","url":"assets.html#Basic-Usage"},{"title":"JavaScript Assets","text":"Assets › JavaScript Assets","url":"assets.html#JavaScript-Assets"},{"title":"ES6 Modules","text":"Assets › ES6 Modules","url":"assets.html#ES6-Modules"},{"title":"Traditional Scripts (Non-module)","text":"Assets › Traditional Scripts (Non-module)","url":"assets.html#Traditional-Scripts-(Non-module)"},{"title":"Binary Assets","text":"Assets › Binary Assets","url":"assets.html#Binary-Assets"},{"title":"Extending Bonito","text":"Extending Bonito\n\nConnection\n\nBy default, Bonito uses its own WebSocket server to create the connection between Julia and JavaScript. By extending Bonito.FrontendConnection, you can create a new type of connection, e.g. using WebRTC to connect Julia and JavaScript.\n\nYour new connection type should support bidirectional messages of binary data. \n\nusing Bonito\nBonito.Page()\n\nmutable struct MyConnection <: Bonito.FrontendConnection\n    # TODO: your implementation here\n    isopen::Bool\n    socket\n    blabla\n    ...\nend\n\nfunction MyConnection()\n    # If you need to do something like start an HTTP server, you can do it here, synchronously.\n    \n    \n    return new(\n        true,\n        ...\n    )\nend\n\nfunction Base.write(connection::MyConnection, binary)\n    # TODO: send the data to JavaScript\n    write(connection.socket, binary)\nend\n\nBase.isopen(connection::MyConnection) = connection.isopen\nBase.close(connection::MyConnection) = (connection.isopen = false)\nopen!(connection::MyConnection) = (connection.isopen = true)\n\nfunction setup_connection(session::Session{MyConnection})\n    # If you need to do something specific for this new session, you can do it here.\n\n    return js\"\"\"\n    // TODO: create a connection\n    create_connection(...).then((conn) => {\n        \n        // TODO: when your connection receives a message from Julia, relay the message to `Bonito.process_message(msg)`.\n        conn.on_msg((msg) => {\n            Bonito.process_message(msg)\n        });\n        \n        // T","url":"extending.html"},{"title":"Connection","text":"Extending Bonito › Connection","url":"extending.html#Connection"},{"title":"Managing your own WebSocket server","text":"Extending Bonito › Managing your own WebSocket server","url":"extending.html#Managing-your-own-WebSocket-server"},{"title":"Customising the websocket cleanup policy","text":"Extending Bonito › Customising the websocket cleanup policy","url":"extending.html#Customising-the-websocket-cleanup-policy"},{"title":"Handlers","text":"Handlers\n\nHandlers are the building blocks for serving content in Bonito. Any type that implements the apply_handler interface can be used with route! to respond to HTTP requests. This makes Bonito's routing system highly extensible - you can wrap existing handlers to add functionality like authentication, rate limiting, or logging.\n\nUnderstanding Handlers\n\nA handler is any type that implements the apply_handler method:\n\nfunction Bonito.HTTPServer.apply_handler(handler::YourHandlerType, context)\n    request = context.request\n    # ... process the request and return HTTP.Response\n    return HTTP.Response(200, \"Hello World\")\nend\n\nThe context parameter provides access to:\n\ncontext.request - The HTTP request object\ncontext.application - The server instance\ncontext.routes - The routes table\ncontext.match - The pattern match result (string or regex match)\n\nBonito's built-in App type is itself a handler, which is why you can use route!(server, \"/\" => app) directly.\n\nCreating Custom Handlers\n\nHere's a simple example of a custom handler that logs requests:\n\nusing Bonito, Dates\n\nstruct LoggingHandler{T}\n    handler::T\n    log_file::String\nend\n\nfunction Bonito.HTTPServer.apply_handler(logger::LoggingHandler, context)\n    request = context.request\n    # Log the request\n    open(logger.log_file, \"a\") do io\n        println(io, \"$(now()): $(request.method) $(request.target)\")\n    end\n    # Delegate to wrapped handler\n    return Bonito.HTTPServer.apply_handler(logger.handler, context)\nend\n\n#","url":"handlers.html"},{"title":"Understanding Handlers","text":"Handlers › Understanding Handlers","url":"handlers.html#Understanding-Handlers"},{"title":"Creating Custom Handlers","text":"Handlers › Creating Custom Handlers","url":"handlers.html#Creating-Custom-Handlers"},{"title":"Built-in Handlers","text":"Handlers › Built-in Handlers","url":"handlers.html#Built-in-Handlers"},{"title":"FolderServer","text":"Handlers › FolderServer","url":"handlers.html#FolderServer"},{"title":"ProtectedRoute","text":"Handlers › ProtectedRoute","url":"handlers.html#ProtectedRoute"},{"title":"Password Storage","text":"Handlers › Password Storage","url":"handlers.html#Password-Storage"},{"title":"SingleUser","text":"Handlers › SingleUser","url":"handlers.html#SingleUser"},{"title":"Custom Password Stores","text":"Handlers › Custom Password Stores","url":"handlers.html#Custom-Password-Stores"},{"title":"Combining Handlers","text":"Handlers › Combining Handlers","url":"handlers.html#Combining-Handlers"},{"title":"Advanced: Handler Context","text":"Handlers › Advanced: Handler Context","url":"handlers.html#Advanced:-Handler-Context"},{"title":"Deployment","text":"Deployment\n\nApps can be deployed in a wide variety of scenarios.\n\nLets start with a very simple example app and show how to deploy that App:\n\nusing Bonito\nexample_app = App(DOM.div(\"hello world\"), title=\"hello world\")\n\nServer\n\n# Depending on your servers setup, you may need to listen on another port or URL\n# But 0.0.0.0:80 is pretty standard for most server setups\nport = 80\nurl = \"0.0.0.0\"\nserver = Bonito.Server(example_app, url, port)\n\nNow, you should see the webpage at http://0.0.0.0:80.\n\nProxy + Julia Hub\n\nIf the server is behind a proxy, you can set the proxy like this:\n\nserver = Bonito.Server(example_app, \"0.0.0.0\", 8080; proxy_url=\"https://my-domain.de/my-app\");\n# or set it later\n# this can be handy for interactive use cases where one isn't sure which port is open, and let Bonito find a free port (which will then be different from the one created with, but is stored in `server.port`)\nserver.proxy_url = \".../$(server.port)\"\n\nYou can also set the proxy_url to \".\" to use relative to the served page url. This works well e.g. for accessing the webpage on a local network, or when serving it online with your own server. This needs to support then establish the websocket connection via the same relative url (so if only the HTML is served via that URL, but not all requests are forwarded to the Bonito server, this won't work).\n\nBonito tries to do this for known environments like JuliaHub via get_server(). This will find the most common proxy setup and return a started server:\n\nse","url":"deployment.html"},{"title":"Server","text":"Deployment › Server","url":"deployment.html#Server"},{"title":"Proxy + Julia Hub","text":"Deployment › Proxy + Julia Hub","url":"deployment.html#Proxy-Julia-Hub"},{"title":"Secure HTTPS connections with SSL","text":"Deployment › Secure HTTPS connections with SSL","url":"deployment.html#Secure-HTTPS-connections-with-SSL"},{"title":"Logging requests","text":"Deployment › Logging requests","url":"deployment.html#Logging-requests"},{"title":"nginx","text":"Deployment › nginx","url":"deployment.html#nginx"},{"title":"Heroku","text":"Deployment › Heroku","url":"deployment.html#Heroku"},{"title":"Terminal","text":"Deployment › Terminal","url":"deployment.html#Terminal"},{"title":"VScode","text":"Deployment › VScode","url":"deployment.html#VScode"},{"title":"Notebooks","text":"Deployment › Notebooks","url":"deployment.html#Notebooks"},{"title":"IJulia","text":"Deployment › IJulia","url":"deployment.html#IJulia"},{"title":"Jupyterlab","text":"Deployment › Jupyterlab","url":"deployment.html#Jupyterlab"},{"title":"Pluto","text":"Deployment › Pluto","url":"deployment.html#Pluto"},{"title":"Electron","text":"Deployment › Electron","url":"deployment.html#Electron"},{"title":"Documenter","text":"Deployment › Documenter","url":"deployment.html#Documenter"},{"title":"Static export","text":"Deployment › Static export","url":"deployment.html#Static-export"},{"title":"Anything else","text":"Deployment › Anything else","url":"deployment.html#Anything-else"},{"title":"Static Sites","text":"Static Sites\n\nThere are several ways to generate static sites with Bonito. The main one is:\n\nexport_static\n\nThe simplest one, which also allows an interactive Revise based workflow is enabled by interactive_server:\n\ninteractive_server\n\nWhen exporting interactions defined within Julia not using Javascript, one can use, to cache all interactions:\n\nBonito.record_states\n\n","url":"static.html"},{"title":"Api","text":"Api\n\nPublic Functions\n\nModules = [Bonito]\nOrder   = [:module, :constant, :type, :function, :macro]\nPublic  = true\nPrivate = false\n\nPrivate Functions\n\nModules = [Bonito]\nOrder   = [:module, :constant, :type, :function, :macro]\nPublic  = false\nPrivate = true\n\nModules = [Bonito.HTTPServer]\nOrder   = [:module, :constant, :type, :function, :macro]\nPublic  = true\nPrivate = true\n\n","url":"api.html"},{"title":"Public Functions","text":"Api › Public Functions","url":"api.html#Public-Functions"},{"title":"Private Functions","text":"Api › Private Functions","url":"api.html#Private-Functions"}];</script></div></div></body></html>
